version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socios-web-dev
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    environment:
      - PORT=8080
      - DATABASE_PATH=/app/data/database.db
      - ENV=development
    restart: unless-stopped
