name: Release and Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Compile Cross-Platform Binaries
        run: |
          mkdir -p dist
          VERSION_TAG="${{ github.ref_name }}"
          echo "Compiling binaries for version: $VERSION_TAG"
          
          # Linux builds
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-w -s -X main.Version=${VERSION_TAG}" -o dist/socios-linux-amd64 cmd/server/main.go
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-w -s -X main.Version=${VERSION_TAG}" -o dist/socios-linux-arm64 cmd/server/main.go
          
          # Windows builds
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-w -s -X main.Version=${VERSION_TAG}" -o dist/socios-windows-amd64.exe cmd/server/main.go
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-w -s -X main.Version=${VERSION_TAG}" -o dist/socios-windows-arm64.exe cmd/server/main.go
          
          # macOS (Darwin) builds
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-w -s -X main.Version=${VERSION_TAG}" -o dist/socios-darwin-amd64 cmd/server/main.go
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-w -s -X main.Version=${VERSION_TAG}" -o dist/socios-darwin-arm64 cmd/server/main.go

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release and Upload Binaries
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/socios-linux-amd64
            dist/socios-linux-arm64
            dist/socios-windows-amd64.exe
            dist/socios-windows-arm64.exe
            dist/socios-darwin-amd64
            dist/socios-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
