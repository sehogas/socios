{{ template "layout" . }}
{{ define "title" }}Restablecer Contraseña{{ end }}
{{ define "content" }}
<div style="max-width: 400px; margin: 3rem auto;" class="card">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">Nueva Contraseña</h2>
    <form action="/restablecer-password" method="POST">
        <input type="hidden" name="token" value="{{ .Token }}">
        <div class="form-group">
            <label for="password">Nueva Contraseña</label>
            <input type="password" name="password" id="password" class="form-control" required minlength="6" placeholder="Mínimo 6 caracteres">
        </div>
        <button type="submit" class="btn btn-success" style="width: 100%;">Guardar Nueva Contraseña</button>
    </form>
</div>
{{ end }}
