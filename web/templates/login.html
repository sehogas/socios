{{ template "layout" . }}
{{ define "title" }}Iniciar Sesión{{ end }}
{{ define "content" }}
<div style="max-width: 400px; margin: 3rem auto;" class="card">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">Iniciar Sesión</h2>
    <form action="/login" method="POST">
        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" name="email" id="email" class="form-control" required placeholder="correo@ejemplo.com">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Ingresar</button>
    </form>
    <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        ¿No tienes cuenta? <a href="/register">Regístrate aquí</a><br>
        ¿Olvidaste tu contraseña? <a href="/recover-password">Recupérala aquí</a>
    </p>
</div>
{{ end }}
