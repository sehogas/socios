{{ template "layout" . }}
{{ define "title" }}Registrarse{{ end }}
{{ define "content" }}
<div style="max-width: 400px; margin: 3rem auto;" class="card">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">Registrarse</h2>
    <form action="/register" method="POST">
        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" name="email" id="email" class="form-control" required placeholder="correo@ejemplo.com">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success" style="width: 100%;">Registrarse</button>
    </form>
    <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        ¿Ya tienes cuenta? <a href="/login">Ingresa aquí</a>
    </p>
</div>
{{ end }}
