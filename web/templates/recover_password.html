{{ template "layout" . }}
{{ define "title" }}Recuperar Contraseña{{ end }}
{{ define "content" }}
<div style="max-width: 400px; margin: 3rem auto;" class="card">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">Recuperar Contraseña</h2>
    <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.5rem; text-align: center;">
        Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.
    </p>
    <form action="/recover-password" method="POST">
        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" name="email" id="email" class="form-control" required placeholder="correo@ejemplo.com">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Enviar Instrucciones</button>
    </form>
    <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        <a href="/login">Volver al Inicio de Sesión</a>
    </p>
</div>
{{ end }}
